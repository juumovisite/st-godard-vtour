<!DOCTYPE html>
<html>
<head>
    <title>Visite Virtuelle - Cathédrale St Godard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
    <style>
        html { height:100%; }
        body { height:100%; overflow:hidden; margin:0; padding:0; font-family:Arial, Helvetica, sans-serif; }
    </style>
</head>
<body>

<script src="tour.js"></script>

<div style="width:100%;height:100%;">
    <noscript><table style="width:100%;height:100%;"><tr style="vertical-align:middle;text-align:center;"><td>ERROR:<br/><br/>Javascript not activated<br/><br/></td></tr></table></noscript>
    <script>
        var lastScene = "";
        embedpano({xml:"tour.xml", passQueryParameters:"startscene,startlookat", id:"krpanoSWFObject"});

        setInterval(function() {
            var krpano = document.getElementById("krpanoSWFObject");
            if (krpano && krpano.get) {
                var currentScene = krpano.get("xml.scene");
                if (currentScene && currentScene !== lastScene) {
                    lastScene = currentScene;
                    window.parent.postMessage({action: "scenechanged", scene: currentScene}, "*");
                }
            }
        }, 300);

        window.showInfoPoint = function(infoId) {
            window.parent.postMessage({action: "showinfo", id: infoId}, "*");
        };
    </script>
    <script>
        window.addEventListener("message", function(e) {
            if (e.data && e.data.action === "loadscene") {
                var krpano = document.getElementById("krpanoSWFObject");
                if (krpano && krpano.call) {
                    krpano.call("loadscene(" + e.data.scene + ", null, MERGE, BLEND(1))");
                }
            }
        });
    </script>
</div>

</body>
</html>
