<!DOCTYPE html>
<html>
<head>
    <title>Visite Virtuelle - Cathédrale St Godard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
    <style>
        html { height:100%; }
        body { height:100%; overflow:hidden; margin:0; padding:0; font-family:Arial, Helvetica, sans-serif; }
    </style>
</head>
<body>

<script src="tour.js"></script>

<div style="width:100%;height:100%;">
    <noscript><table style="width:100%;height:100%;"><tr style="vertical-align:middle;text-align:center;"><td>ERROR:<br/><br/>Javascript not activated<br/><br/></td></tr></table></noscript>
    <script>
        var lastScene = "";
        embedpano({xml:"tour.xml", passQueryParameters:"startscene,startlookat", id:"krpanoSWFObject"});

        setInterval(function() {
            var krpano = document.getElementById("krpanoSWFObject");
            if (krpano && krpano.get) {
                var currentScene = krpano.get("xml.scene");
                if (currentScene && currentScene !== lastScene) {
                    lastScene = currentScene;
                    window.parent.postMessage({action: "scenechanged", scene: currentScene}, "*");
                }
            }
        }, 300);

        window.showInfoPoint = function(infoId) {
            window.parent.postMessage({action: "showinfo", id: infoId}, "*");
        };

        // Hide ALL overlaid elements inside the krpano container
        var hideAttempts = 0;
        var hideInterval = setInterval(function() {
            // Find the krpano container div and hide any child divs that are overlays
            var container = document.getElementById("krpanoSWFObject");
            if (container) {
                var children = container.parentElement.querySelectorAll('div');
                for (var i = 0; i < children.length; i++) {
                    var el = children[i];
                    // Skip the main krpano element and its direct rendering
                    if (el.id === 'krpanoSWFObject' || el.parentElement.id === 'krpanoSWFObject') continue;
                    var s = el.style;
                    // Find small positioned overlay elements (compass, buttons)
                    if (s && s.position === 'absolute' && el.offsetWidth < 100 && el.offsetHeight < 100 && el.offsetTop > (window.innerHeight - 100)) {
                        el.style.display = 'none';
                    }
                }
            }
            hideAttempts++;
            if (hideAttempts > 30) clearInterval(hideInterval);
        }, 300);
    </script>
    <script>
        window.addEventListener("message", function(e) {
            if (e.data && e.data.action === "loadscene") {
                var krpano = document.getElementById("krpanoSWFObject");
                if (krpano && krpano.call) {
                    krpano.call("loadscene(" + e.data.scene + ", null, MERGE, BLEND(1))");
                }
            }
        });
    </script>
</div>

</body>
</html>
